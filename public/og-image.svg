<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main text -->
  <text x="60" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="600" fill="#ffffff" letter-spacing="-2">
    Nguyen Tran-Ngo
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#a1a1aa" letter-spacing="-0.5">
    Designer, Builder, Mentor
  </text>
  
  <!-- Tagline -->
  <text x="60" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#71717a">
    Building European AI & Cloud technologies at Scaleway
  </text>
  
  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="60" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="1140" cy="80" r="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <rect x="80" y="480" width="120" height="4" fill="rgba(255,255,255,0.2)" rx="2"/>
</svg>
